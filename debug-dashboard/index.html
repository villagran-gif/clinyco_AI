<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clinyco Debug</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
      color: #222;
    }
    h1 { margin-bottom: 16px; }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    input, button {
      padding: 8px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      vertical-align: top;
    }
    tr:hover { background: #fafafa; }
    .card {
      background: white;
      padding: 16px;
      margin-top: 16px;
      border-radius: 8px;
    }
    .mono {
      font-family: monospace;
      white-space: pre-wrap;
    }
    .small {
      font-size: 12px;
      color: #666;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      margin: 0 4px 4px 0;
    }
    .badge-neutral {
      background: #edf2f7;
      color: #334155;
    }
    .badge-warn {
      background: #fef3c7;
      color: #92400e;
    }
    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <h1>Clinyco Debug</h1>

  <div class="row">
    <input id="baseUrl" placeholder="https://clinyco-ai.onrender.com" style="width:280px" />
    <input id="debugKey" placeholder="DEBUG KEY" style="width:220px" />
    <input id="conversationId" placeholder="conversation_id (opcional)" style="width:260px" />
    <button id="loadBtn">Cargar</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Hora</th>
          <th>Canal</th>
          <th>Nombre</th>
          <th>Stage</th>
          <th>Next</th>
          <th>Msgs</th>
          <th>Flags</th>
          <th>User</th>
          <th>Bot</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>Detalle</h3>
    <div id="detail" class="mono small">Selecciona una fila</div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
