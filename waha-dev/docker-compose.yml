services:
  # ── Gabriela Heck (puerto 3000) ──
  waha-gabriela:
    image: devlikeapro/waha:latest
    container_name: clinyco-waha-gabriela
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - WHATSAPP_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USER:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASS}
      - WHATSAPP_HOOK_URL=http://observer:3001/waha-webhook/39403066594317
      - WHATSAPP_HOOK_EVENTS=message,message.any,session.status
    volumes:
      - waha_gabriela:/app/.sessions
    networks:
      - clinyco-dev
    restart: unless-stopped

  # ── Allison Contreras (puerto 3002) ──
  waha-allison:
