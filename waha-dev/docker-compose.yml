      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USER:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASS}
      - WHATSAPP_HOOK_URL=http://observer:3001/waha-webhook/29866913338893
      - WHATSAPP_HOOK_EVENTS=message,message.any,session.status
    volumes:
      - waha_allison:/app/.sessions
    networks:
