    restart: unless-stopped

  # ── Observer (único, recibe webhooks de las 5) ──
  observer:
    build: ./observer
    container_name: clinyco-agent-observer
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - clinyco-dev
    depends_on:
      - waha-gabriela
      - waha-allison
      - waha-carolin
      - waha-camila
      - waha-giselle
    restart: unless-stopped

volumes:
  waha_gabriela:
  waha_allison:
  waha_carolin:
  waha_camila:
  waha_giselle:

networks:
  clinyco-dev:
    driver: bridge
